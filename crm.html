  html += `<div class="section-card">
    <h3 style="display:flex;align-items:center;gap:.5rem"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#635BFF" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Stripe Payment Links</h3>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:.8rem">Paste your Stripe payment links here. These appear on invoices as "Pay with Stripe" buttons.</p>
    <div class="form-row">
      <div class="form-group"><label>Launch Partner Setup</label><input id="setStripeLpSetup" value="${esc(s.stripeLpSetup)}" placeholder="https://buy.stripe.com/..."></div>
      <div class="form-group"><label>Launch Partner Monthly</label><input id="setStripeLpMonthly" value="${esc(s.stripeLpMonthly)}" placeholder="https://buy.stripe.com/..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Standard Setup</label><input id="setStripeStdSetup" value="${esc(s.stripeStdSetup)}" placeholder="https://buy.stripe.com/..."></div>
      <div class="form-group"><label>Standard Monthly</label><input id="setStripeStdMonthly" value="${esc(s.stripeStdMonthly)}" placeholder="https://buy.stripe.com/..."></div>

function saveSettingsForm() {
  const s = getSettings();
  s.bizName = document.getElementById('setBizName').value.trim() || s.bizName;
  s.ownerName = document.getElementById('setOwner').value.trim() || s.ownerName;
  s.cityState = document.getElementById('setCityState').value.trim();
  s.address = document.getElementById('setAddress').value.trim();
  s.email = document.getElementById('setEmail').value.trim();
  s.phone = document.getElementById('setPhone').value.trim();
  s.ein = document.getElementById('setEIN').value.trim();
  saveSettings(s);
  logActivity('Settings updated', 'Business information saved');
  alert('Business info saved.');
}

function savePricing() {
  const s = getSettings();
  s.lpSetup = parseInt(document.getElementById('setLPSetup').value, 10) || 500;
  s.lpMonthly = parseInt(document.getElementById('setLPMonthly').value, 10) || 99;
  s.stdSetup = parseInt(document.getElementById('setStdSetup').value, 10) || 800;
  s.stdMonthly = parseInt(document.getElementById('setStdMonthly').value, 10) || 149;
  saveSettings(s);
  logActivity('Settings updated', 'Package pricing saved');
  alert('Pricing saved.');
}

function saveStripeLinks() {
  const s = getSettings();
  s.stripeLpSetup = document.getElementById('setStripeLpSetup').value.trim();
  s.stripeLpMonthly = document.getElementById('setStripeLpMonthly').value.trim();
  s.stripeStdSetup = document.getElementById('setStripeStdSetup').value.trim();
  s.stripeStdMonthly = document.getElementById('setStripeStdMonthly').value.trim();
  saveSettings(s);
  logActivity('Settings updated', 'Stripe payment links saved');
  alert('Stripe links saved.');
}

function exportAllData() {
  const data = {};
  const keys = ['leads', 'clients', 'invoices', 'contracts', 'activity', 'settings'];
  keys.forEach(k => { data[k] = loadData(k, k === 'settings' ? {} : []); });
  data.invSeq = localStorage.getItem('solvra_invSeq') || '0';
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'solvra-crm-backup-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  logActivity('Data exported', 'Full backup downloaded');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  showConfirm('Import Data?', 'This will REPLACE all existing data. Are you sure?', () => {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        const keys = ['leads', 'clients', 'invoices', 'contracts', 'activity', 'settings'];
        keys.forEach(k => { if (data[k] !== undefined) saveData(k, data[k]); });
        if (data.invSeq) localStorage.setItem('solvra_invSeq', data.invSeq);
        logActivity('Data imported', 'Backup restored from file');
        renderPage();
        alert('Data imported successfully.');
      } catch (err) {
        alert('Invalid JSON file: ' + err.message);
      }
    };
    reader.readAsText(file);
  });
  event.target.value = '';
}

function clearAllData() {
  showConfirm('Clear All Data?', 'This will permanently delete ALL leads, clients, invoices, contracts, and activity. Type DELETE to confirm.', () => {
    const keys = ['leads', 'clients', 'invoices', 'contracts', 'activity', 'settings'];
    keys.forEach(k => localStorage.removeItem('solvra_' + k));
    localStorage.removeItem('solvra_invSeq');
    renderPage();
    alert('All data cleared.');
  }, 'DELETE');
}

/* ───── UTILITY: HTML escape ───── */
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

/* ───── INITIALIZATION ───── */
renderNav();
renderPage();
