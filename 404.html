  transition: transform 0.3s, box-shadow 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0, 255, 255, 0.35); }
.btn svg { width: 14px; height: 14px; }

.footer a { color: var(--text-dim); }
